<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Prosty Kalkulator</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .kalkulator { border: 2px solid #333; padding: 20px; border-radius: 10px; background-color: #f9f9f9; width: 300px; }
        input[type="number"], input[type="text"] { width: 100%; padding: 8px; margin: 5px 0 15px 0; box-sizing: border-box; }
        .przyciski { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        button { padding: 10px; cursor: pointer; font-weight: bold; border: 1px solid #333; border-radius: 4px; }
        button:hover { background-color: #ddd; }
        .btn-clear { grid-column: span 2; background-color: #ffcccc; }
        .btn-clear:hover { background-color: #ffaaaa; }
        label { font-weight: bold; }
    </style>
</head>
<body>

<div class="kalkulator">
    <label>Liczba 1:</label>
    <input type="number" id="l1" placeholder="Wpisz liczbę">
    
    <label>Liczba 2:</label>
    <input type="number" id="l2" placeholder="Wpisz liczbę">
    
    <label>Wynik:</label>
    <input type="text" id="wynik" readonly>

    <div class="przyciski">
        <button onclick="oblicz('+')">Dodawanie (+)</button>
        <button onclick="oblicz('-')">Odejmowanie (-)</button>
        <button onclick="oblicz('*')">Mnożenie (*)</button>
        <button onclick="oblicz('/')">Dzielenie (/)</button>
        <button class="btn-clear" onclick="wyczysc()">KASUJ</button>
    </div>
</div>

<script>
    function oblicz(operacja) {
        // Pobieranie wartości i konwersja na liczby zmiennoprzecinkowe
        const a = parseFloat(document.getElementById('l1').value);
        const b = parseFloat(document.getElementById('l2').value);
        const poleWyniku = document.getElementById('wynik');

        // Sprawdzenie czy pola nie są puste
        if (isNaN(a) || isNaN(b)) {
            poleWyniku.value = "Wpisz obie liczby!";
            return;
        }

        let wynik;
        switch (operacja) {
            case '+': wynik = a + b; break;
            case '-': wynik = a - b; break;
            case '*': wynik = a * b; break;
            case '/': 
                if (b === 0) {
                    wynik = "Nie dziel przez 0!";
                } else {
                    wynik = a / b;
                }
                break;
        }

        poleWyniku.value = wynik;
    }

    function wyczysc() {
        document.getElementById('l1').value = "";
        document.getElementById('l2').value = "";
        document.getElementById('wynik').value = "";
    }
</script>

</body>
</html>
