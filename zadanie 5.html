<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Licznik znaków</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; line-height: 1.6; }
        .container { max-width: 500px; border: 1px solid #ccc; padding: 20px; border-radius: 8px; }
        textarea { width: 100%; height: 150px; margin-bottom: 10px; }
        .result-box { font-weight: bold; }
        input[type="text"] { width: 50px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Formularz wprowadzania danych</h2>
    <p>Wpisz tekst w poniższe pole:</p>
    
    <textarea id="poleTekstowe" placeholder="Zacznij pisać..."></textarea>
    
    <div class="result-box">
        Liczba znaków: <input type="text" id="licznik" value="0" readonly>
    </div>
</div>

<script>
    const textarea = document.getElementById('poleTekstowe');
    const licznik = document.getElementById('licznik');

    // Procedura zliczająca znaki przy każdej zmianie w polu textarea
    textarea.addEventListener('input', function() {
        const dlugosc = textarea.value.length;
        licznik.value = dlugosc;
    });
</script>

</body>
</html>
